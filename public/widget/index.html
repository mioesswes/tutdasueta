<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Stream Alert Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    font-family: Arial, sans-serif;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 20px;
  }

  #alert-container {
    position: relative;
    width: 600px;
    max-width: 95vw;
    pointer-events: none;
  }

  .alert-box {
    background: transparent;
    border: none;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transform: translateY(-30px) scale(0.95);
    transition:
      opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
      transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .alert-box.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .alert-box.hiding {
    opacity: 0;
    transform: translateY(-20px) scale(0.97);
    transition:
      opacity 0.4s ease-in,
      transform 0.4s ease-in;
  }

  .alert-text1 {
    font-family: Arial, sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.2;
    word-break: break-word;
    width: 100%;
    display: block;
  }

  .alert-text2 {
    font-family: Arial, sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.4;
    word-break: break-word;
    width: 100%;
    display: block;
  }

  #status {
    position: fixed;
    bottom: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ff4444;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #status.disconnected { opacity: 1; background: #ff4444; }
  #status.connected { opacity: 0; }
</style>
</head>
<body>
<div id="alert-container">
  <div class="alert-box" id="alertBox">
    <div class="alert-text1" id="text1"></div>
    <div class="alert-text2" id="text2"></div>
  </div>
</div>
<div id="status"></div>
<audio id="donAudio" src="/public/uploads/don.m4a" preload="auto"></audio>
<audio id="alertAudio" preload="auto"></audio>

<script>
  const alertBox = document.getElementById('alertBox');
  const text1El = document.getElementById('text1');
  const text2El = document.getElementById('text2');
  const donAudio = document.getElementById('donAudio');
  const audioEl = document.getElementById('alertAudio');
  const statusDot = document.getElementById('status');

  // ID стримера из URL: /widget/AbCdEfGhIj
  const streamerId = location.pathname.split('/').filter(Boolean).pop();

  let hideTimeout = null;
  const alertQueue = [];
  let isShowingAlert = false;

  function enqueueAlert(data) {
    alertQueue.push(data);
    if (!isShowingAlert) processQueue();
  }

  function processQueue() {
    if (alertQueue.length === 0) { isShowingAlert = false; return; }
    isShowingAlert = true;
    showAlert(alertQueue.shift());
  }

  function showAlert(data) {
    text1El.textContent = data.text1 || '';
    text2El.textContent = data.text2 || '';

    const s = data.styles || {};
    applyStyles(text1El, s.text1 || {});
    applyStyles(text2El, s.text2 || {});

    alertBox.classList.remove('hiding');
    alertBox.classList.add('visible');

    // Сначала играет don.m4a, потом — выбранное аудио (если есть)
    function playSelected() {
      if (data.audioUrl) {
        audioEl.src = data.audioUrl;
        audioEl.load();
        audioEl.onended = () => scheduleHide(0);
        audioEl.onerror = () => scheduleHide(0);
        audioEl.play().catch(() => scheduleHide(0));
      } else {
        scheduleHide(0);
      }
    }

    donAudio.onended = null;
    donAudio.onerror = null;
    donAudio.currentTime = 0;

    donAudio.onended = () => {
      donAudio.onended = null;
      donAudio.onerror = null;
      playSelected();
    };
    donAudio.onerror = () => {
      donAudio.onended = null;
      donAudio.onerror = null;
      console.warn('don.m4a error, skipping to selected audio');
      playSelected();
    };

    const donPromise = donAudio.play();
    if (donPromise !== undefined) {
      donPromise.catch(e => {
        console.warn('don.m4a play() rejected:', e);
        donAudio.onended = null;
        donAudio.onerror = null;
        playSelected();
      });
    }
  }

  function scheduleHide(delay) {
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
      alertBox.classList.remove('visible');
      alertBox.classList.add('hiding');
      setTimeout(() => {
        alertBox.classList.remove('hiding');
        processQueue();
      }, 500);
    }, delay);
  }

  function applyStyles(el, styles) {
    // Всегда Arial, нельзя переопределить
    el.style.fontFamily = 'Arial, sans-serif';
    el.style.fontSize = styles.fontSize ? styles.fontSize + 'px' : '';
    el.style.color = styles.color || '';
    el.style.fontWeight = styles.fontWeight || '';
    el.style.textShadow = styles.textShadow || '';
    // Обводка наружу через text-shadow (8 направлений)
    if (styles.stroke && styles.strokeWidth > 0) {
      const c = styles.stroke;
      const w = styles.strokeWidth;
      const diag = Math.round(w * 0.707 * 10) / 10;
      const existingShadow = styles.textShadow || '';
      const strokeShadow = [
        `${w}px 0 0 ${c}`, `-${w}px 0 0 ${c}`,
        `0 ${w}px 0 ${c}`, `0 -${w}px 0 ${c}`,
        `${diag}px ${diag}px 0 ${c}`, `-${diag}px ${diag}px 0 ${c}`,
        `${diag}px -${diag}px 0 ${c}`, `-${diag}px -${diag}px 0 ${c}`
      ].join(', ');
      el.style.textShadow = existingShadow
        ? strokeShadow + ', ' + existingShadow
        : strokeShadow;
      el.style.webkitTextStroke = '';
    } else {
      el.style.webkitTextStroke = '';
    }
    el.style.textAlign = styles.textAlign || 'left';
  }

  const WS_HOST = location.host;
  let ws;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${WS_HOST}/?streamer=${streamerId}`);
    ws.onopen = () => { statusDot.className = 'connected'; };
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'alert') enqueueAlert(data);
      } catch(e) {}
    };
    ws.onclose = () => {
      statusDot.className = 'disconnected';
      setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
